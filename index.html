<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>100名店カスタムマップ</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="data.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .popup-card { min-width: 200px; padding: 10px; }
        .popup-title { font-weight: bold; font-size: 16px; display: block; margin-bottom: 4px; }
        .btn { display: block; text-align: center; padding: 10px; margin-top: 8px; border-radius: 8px; text-decoration: none; font-weight: bold; color: white; }
        .btn-tabelog { background: #ff6600; }
        .btn-nav { background: #4285f4; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'gsi-pale': {
                    type: 'raster',
                    tiles: ['https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png'],
                    tileSize: 256,
                    attribution: "© 国土地理院"
                }
            },
            layers: [{ id: 'gsi-pale-layer', type: 'raster', source: 'gsi-pale' }]
        },
        center: [139.76, 35.68],
        zoom: 11
    });

    const geolocate = new maplibregl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true,
        showUserLocation: true
    });
    map.addControl(geolocate);

    map.on('load', () => {
        // iPhone/Android用自動現在地取得
        setTimeout(() => { geolocate.trigger(); }, 1000);

        // 1. 画像の読み込み（SDFオプションを有効化）
        map.loadImage('tabe.png', (error, image) => { 
            if (error) throw error;
            map.addImage('tabe-icon', image, { sdf: true });

            map.addSource('shops', {
                type: 'geojson',
                data: shopData,
                cluster: false
            });

            // 2. 背景レイヤー（オレンジの四角/丸 ＋ 白枠）
            map.addLayer({
                id: 'points-bg',
                type: 'circle',
                source: 'shops',
                paint: {
                    'circle-color': '#FF9800',       // 背景のオレンジ色
                    'circle-radius': 16,             // アイコンより一回り大きく
                    'circle-stroke-width': 2,        // 白枠の太さ
                    'circle-stroke-color': '#FFFFFF' // 白枠
                }
            });

            // 3. アイコンレイヤー（元の黒を白に塗り替え）
            map.addLayer({
                id: 'points-icon',
                type: 'symbol',
                source: 'shops',
                layout: {
                    'icon-image': 'tabe-icon',
                    'icon-size': 0.5,                // 64px画像なら半分にしてクッキリ
                    'icon-allow-overlap': true
                },
                paint: {
                    'icon-color': '#FFFFFF'          // 画像の黒い部分を白に変更
                }
            });

            // クリックイベント
            map.on('click', 'points-bg', (e) => {
                const p = e.features[0].properties;
                const c = e.features[0].geometry.coordinates;
                const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${c[1]},${c[0]}`;
                new maplibregl.Popup()
                    .setLngLat(c)
                    .setHTML(`
                        <div class="popup-card">
                            <span class="popup-title">${p.name}</span>
                            <a href="${p.url}" target="_blank" class="btn btn-tabelog">食べログ</a>
                            <a href="${navUrl}" target="_blank" class="btn btn-nav">ここへ行く</a>
                        </div>
                    `)
                    .addTo(map);
            });
        });
    });
</script>
</body>
</html>
